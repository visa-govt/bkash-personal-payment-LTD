<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>bKash Payment | Online Global payment</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{font-family:Arial;background:#f4f6f9;margin:0}
.card{max-width:420px;margin:40px auto;background:#fff;padding:20px;border-radius:10px;box-shadow:0 2px 10px rgba(0,0,0,.1)}
h2{text-align:center;color:#d81b60}
label{font-weight:bold;margin-top:15px;display:block}
input{width:100%;padding:10px;margin-top:5px;border:1px solid #ccc;border-radius:5px}
button{margin-top:15px;width:100%;padding:12px;background:#d81b60;color:#fff;border:none;border-radius:5px;font-size:13px}
.success{color:green;margin-top:15px;text-align:center}
</style>
</head>

<body>

<div class="card">
<img src="https://uploads.onecompiler.io/44g2943xm/44gbfkdxk/1000215151.png" alt="Canada" width="100%" height="5%">
<h2>• bKash Personal</h2>
<p id="msg" class="success"></p>

<p>
<b>• Account Type:</h2> Bkash Personal </h2>
<input type="text" value="+8801316132096" id="myInput">
<button onclick="myFunction()"> Copy Now</button>
</p>

<label>• Name</label>
<input id="name" placeholder="Your Name">

<label>• Payment Number</label>
<input id="phone" placeholder="01XXXXXXXXX">

<label>• Amount</label>
<input id="amount" placeholder="Enter amount">

<label>• Transaction ID</label>
<input id="trxid" placeholder="TrxID">

<form action="/action_page.php">
  <input type="file" id="myFile" name="filename">
</form>

<button onclick="submitPay()">Submit Payment</button>
    <img src="https://uploads.onecompiler.io/44fhurcgn/44fs8xjwq/8644.png" alt="bkash" width="100%" height="5%">
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBnpyZxD7Ju7JQdNYTOnasAeiihDKS0bpI",
  authDomain: "australian-web-9a688.firebaseapp.com",
  databaseURL: "https://australian-web-9a688-default-rtdb.firebaseio.com",
  projectId: "australian-web-9a688"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

function submitPay(){
  const name = document.getElementById("name").value.trim();
  const phone = document.getElementById("phone").value.trim();
  const amount = document.getElementById("amount").value.trim();
  const trxid = document.getElementById("trxid").value.trim();

  if(!name || !phone || !amount || !trxid){
    alert("পেমেন্ট করুন এবং পেমেন্ট তথ্য সাবমিট করুন");
    return;
  }

  db.ref("bkash_payments").push({
    name,
    phone,
    amount,
    trxid,
    status:"pending",
    time:new Date().toLocaleString()
  });

  document.getElementById("msg").innerHTML =
    "✔ Payment Submitted. একটু অপেক্ষা করুন কনফার্মেশন মেসেজ পেয়ে যাবেন ধন্যবাদ।.";

  document.getElementById("name").value="";
  document.getElementById("phone").value="";
  document.getElementById("amount").value="";
  document.getElementById("trxid").value="";
}
function myFunction() {
  // Get the text field
  var copyText = document.getElementById("myInput");

  // Select the text field
  copyText.select();
  copyText.setSelectionRange(0, 99999); // For mobile devices

  // Copy the text inside the text field
  navigator.clipboard.writeText(copyText.value);
  
  // Alert the copied text
  alert("Copied the text: " + copyText.value);
}
</script>

</body>
</html>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBnpyZxD7Ju7JQdNYTOnasAeiihDKS0bpI",
  authDomain: "australian-web-9a688.firebaseapp.com",

  projectId: "australian-web-9a688"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

function submitPay(){
  const name = document.getElementById("name").value.trim();
  const phone = document.getElementById("phone").value.trim();
  const amount = document.getElementById("amount").value.trim();
  const trxid = document.getElementById("trxid").value.trim();

  if(!name || !phone || !amount || !trxid){
    alert("পেমেন্ট করুন এবং পেমেন্ট তথ্য সাবমিট করুন");
    return;
  }

  db.ref("bkash_payments").push({
    name,
    phone,
    amount,
    trxid,
    status:"pending",
    time:new Date().toLocaleString()
  });

  document.getElementById("msg").innerHTML =
    "✔ Payment Submitted. একটু অপেক্ষা করুন কনফার্মেশন মেসেজ পেয়ে যাবেন ধন্যবাদ।.";

  document.getElementById("name").value="";
  document.getElementById("phone").value="";
  document.getElementById("amount").value="";
  document.getElementById("trxid").value="";
}
function myFunction() {
  // Get the text field
  var copyText = document.getElementById("myInput");

  // Select the text field
  copyText.select();
  copyText.setSelectionRange(0, 99999); // For mobile devices

  // Copy the text inside the text field
  navigator.clipboard.writeText(copyText.value);
  
  // Alert the copied text
  alert("Copied the text: " + copyText.value);
}
</script>

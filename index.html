  .btn-copy { background: #0b3a6e; color: white; border: none; padding: 4px 10px; border-radius: 4px; font-size: 11px; cursor: pointer; width: auto; margin-top: 0; }
  .btn-copy:hover { background: #d81b60; }

  /* --- Dynamic Status Message Style --- */

  .status-error { background: #fce8e6; color: #c5221f; border: 1px solid #fad2cf; }

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBnpyZxD7Ju7JQdNYTOnasAeiihDKS0bpI",
  authDomain: "australian-web-9a688.firebaseapp.com",
  databaseURL: "https://australian-web-9a688-default-rtdb.firebaseio.com",
  projectId: "australian-web-9a688"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// --- আপনার লাইভ Sent.dm API তথ্য এখানে কনফিগার করে দেওয়া হয়েছে ---
const SENT_DM_API_KEY = "a97dd58f-8aa7-486a-9e25-4b6a8a763d69"; 
const SENT_DM_SENDER_ID = "2809cab4-d28c-41e8-b61e-dc186342dd73";       

// Generate QR Codes Automatically
window.onload = function() {
  new QRCode(document.getElementById("qrcode1"), {
    text: "8801916998884",
    width: 80,
    height: 80
  });

  new QRCode(document.getElementById("qrcode2"), {
    text: "+8801898397060",
    width: 80,
    height: 80
  });
};

// Copy Function
function copyNumber(num) {
  navigator.clipboard.writeText(num).then(() => {
    alert("Number copied successfully: " + num);
  }).catch(err => {
    alert("Failed to copy. Please copy manually.");
  });
}

// হোয়াটসঅ্যাপ মেসেজ পাঠানোর ফাংশন
function sendWhatsAppNotification(userName, userPhone, userAmount, transactionId) {
  const messageText = `*Global Visa Guide*\n\nপ্রিয় ${userName},\nআপনার ${userAmount} BDT-এর পেমেন্ট তথ্যটি সফলভাবে জমা হয়েছে।\n\n*TrxID:* ${transactionId}\n\nপেমেন্টটি ম্যানুয়ালি ভেরিফাই করে কনফার্ম করা হলে আপনি আরেকটি কনফার্মেশন মেসেজ পেয়ে যাবেন। আমাদের সাথে থাকার জন্য ধন্যবাদ!`;

  // আপনার ইনপুট নাম্বারটিকে আন্তর্জাতিক ফরম্যাটে রূপান্তর করার চেষ্টা (যেমন: 88017...)
  let formattedPhone = userPhone.replace(/[^0-9]/g, '');
  if (formattedPhone.startsWith('0')) {
    formattedPhone = '88' + formattedPhone;
  }

  // Sent.dm API Fetch Request
  fetch(`https://api.sent.dm/v1/phone/${SENT_DM_SENDER_ID}/media/text`, {
    method: "POST",
    headers: {
      "Authorization": `Bearer ${SENT_DM_API_KEY}`,
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      recipient: formattedPhone,
      body: messageText
    })
  })
  .then(response => response.json())
  .then(data => console.log("WhatsApp Notification Sent:", data))
  .catch(error => console.error("Error sending WhatsApp:", error));
}

function submitPay(){
  const name = document.getElementById("name").value.trim();
  const phone = document.getElementById("phone").value.trim();
  const amount = document.getElementById("amount").value.trim();
  const trxid = document.getElementById("trxid").value.trim();
  const alertBox = document.getElementById("responseAlert");
  const alertIcon = document.getElementById("alertIcon");
  const alertText = document.getElementById("alertText");

  // Error Alert
  if(!name || !phone || !amount || !trxid){
    alertBox.className = "status-box status-error";
    alertIcon.src = "https://uploads.onecompiler.io/44q8kzxda/44q8m2usv/1000235653.png";
    alertText.innerHTML = "<b>ত্রুটি:</b> অনুগ্রহ করে পেমেন্ট করুন এবং পেমেন্টের সঠিক তথ্যগুলো পূরণ করে সাবমিট করুন।";
    alertBox.style.display = "flex";
    return;
  }

  // Firebase Database Push
  db.ref("bkash_payments").push({
    name,
    phone,
    amount,
    trxid,
    status:"pending",
    time:new Date().toLocaleString()
  });

  // স্বয়ংক্রিয়ভাবে হোয়াটসঅ্যাপ মেসেজ ট্রিগার করা
  sendWhatsAppNotification(name, phone, amount, trxid);

  // Success Alert
  alertBox.className = "status-box status-success";
  alertIcon.src = "https://img.icons8.com/color/48/verified-badge.png";
  alertText.innerHTML = "গ্লোবাল পেমেন্ট করার জন্য অসংখ্য ধন্যবাদ। পেমেন্টটি কনফার্ম করা হলে আপনি একটি কনফার্মেশন মেসেজ পেয়ে যাবেন, ধন্যবাদ।";
  alertBox.style.display = "flex";

  // Reset inputs
  document.getElementById("name").value="";
  document.getElementById("phone").value="";
  document.getElementById("amount").value="";
  document.getElementById("trxid").value="";
}
</script>
